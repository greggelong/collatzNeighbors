<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Collatz Twins – Center Origin & Right‑Twisting Tree</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 15px;
            left: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 14px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 14px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .info span {
            color: #ffaa44;
            font-weight: bold;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>
    <div class="info">
        🌀 Number: <span id="currentNum">—</span> &nbsp;|&nbsp;
        🔥 Neighbor pair: <span id="highlightStatus">No</span>
    </div>

    <script>
        // ----- globals -----
        let num = 0;
        let stepCache = new Map();

        // constants
        const SEGMENT_LEN = 5;
        const TREE_OFFSET_Y = 30;   // vertical distance between the two trees
        const ROT_ODD_LEFT = -6.5;   // original: odd → left
        const ROT_EVEN_RIGHT = 3;     // original: even → right
        // for the second tree (right‑twisting)
        const ROT_ODD_RIGHT = 6.5;    // odd → right
        const ROT_EVEN_LEFT = -3;     // even → left

        function setup() {
            createCanvas(windowWidth, windowHeight);
            pixelDensity(1)
            angleMode(DEGREES);
            background(0);
            noFill();
            strokeWeight(1.5);
            frameRate(30);
        }

        function draw() {
            num++;
            if (num > 15000) {
                // optional: stop after a while
                // noLoop();
            }

            const stepsCurr = getTotalSteps(num);
            const stepsNext = getTotalSteps(num + 1);
            const isNeighbor = (stepsCurr === stepsNext);
            updateInfo(num, isNeighbor);

            const path = buildCollatzPath(num);

            // draw first tree (original twist) – starts at canvas center
            drawTree(path, isNeighbor, width / 2, height - 50, ROT_ODD_LEFT, ROT_EVEN_RIGHT);

            // draw second tree (right‑twisting) – starts underneath (vertical offset)
            drawTree(path, isNeighbor, width / 2, height - 50 + TREE_OFFSET_Y, ROT_ODD_RIGHT, ROT_EVEN_LEFT);
        }

        // ---------- Collatz utilities ----------
        function getTotalSteps(n) {
            if (stepCache.has(n)) return stepCache.get(n);
            let steps = 0;
            let m = BigInt(n);
            while (m !== 1n) {
                if (m % 2n === 0n) {
                    m = m / 2n;
                } else {
                    m = m * 3n + 1n;
                }
                steps++;
            }
            stepCache.set(n, steps);
            return steps;
        }

        function buildCollatzPath(n) {
            let path = [n];
            let m = n;
            while (m !== 1) {
                if (m % 2 === 0) {
                    m = m / 2;
                } else {
                    m = m * 3 + 1;
                }
                path.unshift(m);
            }
            return path;
        }

        // Draw a single tree
        function drawTree(path, highlight, startX, startY, rotOdd, rotEven) {
            push();
            translate(startX, startY);
            const segmentLength = SEGMENT_LEN;

            if (highlight) {
                drawingContext.shadowBlur = 15;
                drawingContext.shadowColor = "#ffaa44";
                stroke(255, 200, 80);
                strokeWeight(8.5);
            } else {
                stroke(random(100, 255), random(100, 255), random(100, 255));
                strokeWeight(4.2);
            }

            for (let i = 0; i < path.length; i++) {
                const val = path[i];
                if (val % 2 === 0) {
                    rotate(rotEven);
                } else {
                    rotate(rotOdd);
                }
                point(0, 0);
                translate(0, -segmentLength);
            }

            // end marker
            push();
            translate(0, segmentLength);
            fill(highlight ? "#ffaa44" : "#ffffff");
            noStroke();
            circle(0, 0, 10);
            pop();

            pop();
            drawingContext.shadowBlur = 0;
        }

        function updateInfo(n, isHighlight) {
            const numSpan = document.getElementById("currentNum");
            const statusSpan = document.getElementById("highlightStatus");
            if (numSpan) numSpan.innerText = n;
            if (statusSpan) {
                statusSpan.innerText = isHighlight ? "YES ✨" : "No";
                statusSpan.style.color = isHighlight ? "#ffaa44" : "#aaa";
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            background(0);
            console.log("Canvas resized – background reset.");
        }
    </script>
</body>

</html>
